<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarSell | Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div class="brand">
          <span>🚗</span>
          <div>
            <h1>CarSell</h1>
            <p>Entrar ou cadastrar</p>
          </div>
        </div>

        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="index.html#catalogo">Catálogo</a>
          <a href="vender.html">Vender</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="auth-page">
        <div class="card form-card auth-page-card">
          <h2>Login</h2>
          <form id="loginFormPage">
            <div class="input-group">
              <label for="pageEmail">Email</label>
              <input type="email" id="pageEmail" placeholder="seu@email.com" required />
            </div>
            <div class="input-group">
              <label for="pagePassword">Senha</label>
              <input type="password" id="pagePassword" placeholder="Senha" required />
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">Entrar</button>
              <a href="index.html" class="btn-secondary">Voltar</a>
            </div>
            <p id="pageAuthMessage" class="form-message"></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>CarSell © 2026</p>
      </div>
    </footer>

    <script>
      // Navegação mínima: tenta usar localStorage para autenticar
      const loginFormPage = document.getElementById('loginFormPage');
      const pageAuthMessage = document.getElementById('pageAuthMessage');

      loginFormPage.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('pageEmail').value.trim().toLowerCase();
        const password = document.getElementById('pagePassword').value;
        const users = JSON.parse(localStorage.getItem('carsellUsers') || '[]');
        const found = users.find((u) => u.email === email && u.password === password);
        if (!found) {
          pageAuthMessage.textContent = 'Conta não encontrada.';
          return;
        }
        localStorage.setItem('carsellCurrentUser', JSON.stringify(found));
        pageAuthMessage.textContent = 'Logado! Redirecionando...';
        setTimeout(() => (window.location.href = 'index.html'), 800);
      });
    </script>
  </body>
</html>
